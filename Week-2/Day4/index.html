<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4:Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Create Account</h2>
        <p id="success-msg" class="success-hidden">Registration Successful!</p>

        <form id="signup-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name-input" placeholder="e.g. Toseef">
                <span id="name-error" class="error-msg"></span>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="text" id="email-input" placeholder="e.g. user@email.com">
                <span id="email-error" class="error-msg"></span>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password-input" placeholder="******">
                <span id="password-error" class="error-msg"></span>
            </div>

            <button type="submit">Sign Up</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
